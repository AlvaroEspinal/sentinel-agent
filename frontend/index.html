<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0e17" />
    <title>Parcl Intelligence | Real Estate Geospatial Platform</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0e17;
        font-family: 'JetBrains Mono', monospace;
      }
      /* Loading screen */
      #parcl-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0e17;
        z-index: 99999;
        transition: opacity 0.5s ease;
      }
      #parcl-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #parcl-loader .logo-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 1.5rem;
        font-weight: 600;
        color: #2563eb;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        margin-bottom: 2rem;
      }
      #parcl-loader .bar-track {
        width: 240px;
        height: 2px;
        background: #1e293b;
        border-radius: 1px;
        overflow: hidden;
      }
      #parcl-loader .bar-fill {
        height: 100%;
        width: 30%;
        background: #2563eb;
        border-radius: 1px;
        animation: loader-slide 1.2s ease-in-out infinite;
      }
      @keyframes loader-slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(400%); }
      }
    </style>
  </head>
  <body>
    <div id="parcl-loader">
      <div class="logo-text">PARCL INTELLIGENCE</div>
      <div class="bar-track">
        <div class="bar-fill"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
